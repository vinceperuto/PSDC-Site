<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSDC Projects | Philadelphia Suburban Development Corp.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --navy: #0d1f3c;
    --navy-mid: #1a3560;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f4ef;
    --slate: #4a5568;
    --light: #eef1f7;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(13,31,60,0.13);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--navy); }

  /* ── Header ── */
  #header {
    background: var(--navy);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    height: 64px;
    box-shadow: 0 2px 16px rgba(13,31,60,0.3);
    position: relative;
    z-index: 1001;
  }
  #header-brand {
    display:flex; align-items:center; gap:14px;
  }
  #header-logo {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 6px;
    display: flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif;
    font-size:14px; font-weight:900; color:var(--navy);
    letter-spacing:1px;
    flex-shrink:0;
  }
  #header h1 {
    font-family:'Playfair Display',serif;
    font-size:17px; font-weight:700;
    color:var(--white);
    line-height:1.2;
  }
  #header h1 span { color:var(--gold-light); font-size:11px; font-weight:300; font-family:'DM Sans',sans-serif; display:block; letter-spacing:0.05em; }

  #header-filters {
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .fchip {
    background:rgba(255,255,255,0.09);
    border:1.5px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:5px 14px;
    font-size:11.5px; color:rgba(255,255,255,0.75);
    cursor:pointer; transition:all 0.18s;
    white-space:nowrap; font-weight:500;
    letter-spacing:0.03em;
  }
  .fchip:hover, .fchip.active {
    background:var(--gold);
    border-color:var(--gold);
    color:var(--navy);
    font-weight:700;
  }
  #header-count {
    font-size:12px; color:rgba(255,255,255,0.45);
    white-space:nowrap; font-weight:300;
    margin-left:4px;
  }
  #header-count strong { color:var(--gold-light); font-weight:600; }

  /* ── Layout ── */
  #app { display:flex; height:calc(100vh - 64px); }

  /* ── Sidebar ── */
  #sidebar {
    width:340px; flex-shrink:0;
    background:var(--white);
    overflow-y:auto;
    border-right:1px solid #e2e8f0;
    box-shadow:2px 0 12px rgba(13,31,60,0.07);
    z-index:10;
  }
  #sidebar::-webkit-scrollbar { width:4px; }
  #sidebar::-webkit-scrollbar-thumb { background:#c8d0e0; border-radius:2px; }

  .sidebar-header {
    padding:18px 20px 12px;
    border-bottom:1px solid #eef1f7;
    background:var(--cream);
    position:sticky; top:0; z-index:2;
  }
  .sidebar-header h2 {
    font-family:'Playfair Display',serif;
    font-size:15px; font-weight:700; color:var(--navy);
  }
  .sidebar-header p { font-size:11px; color:var(--slate); margin-top:2px; }

  .prop-card {
    padding:16px 20px;
    border-bottom:1px solid #eef1f7;
    cursor:pointer;
    transition:all 0.15s;
    position:relative;
  }
  .prop-card:hover { background:var(--cream); }
  .prop-card.active {
    background:#eef3ff;
    border-left:3px solid var(--navy-mid);
    padding-left:17px;
  }
  .prop-card-type {
    font-size:9.5px; font-weight:700; letter-spacing:0.1em;
    text-transform:uppercase; margin-bottom:4px;
    color:var(--gold);
  }
  .prop-card-name {
    font-family:'Playfair Display',serif;
    font-size:14px; font-weight:700;
    color:var(--navy); line-height:1.3; margin-bottom:3px;
  }
  .prop-card-addr {
    font-size:11.5px; color:var(--slate); margin-bottom:8px;
  }
  .prop-card-tags { display:flex; gap:5px; flex-wrap:wrap; }
  .tag {
    font-size:10px; font-weight:600; padding:2px 8px;
    border-radius:10px; letter-spacing:0.02em;
  }
  .tag-status-active { background:#d1fae5; color:#065f46; }
  .tag-status-proposed { background:#fef3c7; color:#92400e; }
  .tag-status-dead { background:#fee2e2; color:#991b1b; }
  .tag-status-hq { background:#ede9fe; color:#4c1d95; }
  .tag-type { background:var(--light); color:var(--navy-mid); }

  /* ── Map ── */
  #map { flex:1; }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    border-radius:10px;
    box-shadow:0 8px 32px rgba(13,31,60,0.2);
    padding:0; overflow:hidden;
    border:none;
    font-family:'DM Sans',sans-serif;
  }
  .leaflet-popup-content { margin:0; min-width:280px; max-width:320px; }
  .leaflet-popup-tip { background:var(--navy); }

  .popup-hero {
    background:var(--navy);
    padding:14px 16px 12px;
    position:relative;
  }
  .popup-type {
    font-size:9px; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--gold);
    margin-bottom:3px;
  }
  .popup-name {
    font-family:'Playfair Display',serif;
    font-size:16px; font-weight:700; color:var(--white);
    line-height:1.25;
  }
  .popup-addr {
    font-size:11px; color:rgba(255,255,255,0.6);
    margin-top:4px;
  }
  .popup-body { padding:12px 16px; background:var(--white); }
  .popup-row {
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:5px 0; border-bottom:1px solid #f0f4f8;
    font-size:11.5px; gap:10px;
  }
  .popup-row:last-child { border-bottom:none; padding-bottom:0; }
  .popup-row .lbl { color:#94a3b8; font-weight:500; white-space:nowrap; flex-shrink:0; }
  .popup-row .val { color:var(--navy); font-weight:600; text-align:right; }
  .popup-desc {
    font-size:11.5px; color:var(--slate); line-height:1.55;
    padding:10px 0 4px; border-top:1px solid #f0f4f8; margin-top:4px;
  }
  .popup-badge {
    display:inline-block; font-size:9.5px; font-weight:700;
    padding:3px 9px; border-radius:10px; margin-top:8px;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  .badge-active { background:#d1fae5; color:#065f46; }
  .badge-proposed { background:#fef3c7; color:#92400e; }
  .badge-dead { background:#fee2e2; color:#991b1b; }
  .badge-hq { background:#ede9fe; color:#4c1d95; }

  /* ── Legend ── */
  .map-legend {
    background:white; padding:12px 16px;
    border-radius:10px; font-size:11px;
    box-shadow:var(--shadow); line-height:2;
    font-family:'DM Sans',sans-serif;
  }
  .map-legend h4 {
    font-family:'Playfair Display',serif;
    font-size:11px; font-weight:700; color:var(--navy);
    margin-bottom:4px; text-transform:uppercase; letter-spacing:0.08em;
  }
  .legend-row { display:flex; align-items:center; gap:7px; }
  .legend-dot {
    width:13px; height:13px; border-radius:50%; flex-shrink:0;
    border:2px solid rgba(255,255,255,0.8);
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
  }

  /* ── Pin colors ── */
  /* office=#0d1f3c, mixed=#c9a84c, residential=#1a7a4a, dev-site=#e05c2a, hq=#6b3fa0, dead=#94a3b8 */
</style>
</head>
<body>

<div id="header">

    <div id="header-logo">PSDC</div>
    <h1>Current &amp; Upcoming Developments
      <span>Philadelphia Suburban Development Corporation</span>
    </h1>
  </div>
  <div id="header-filters">
    <button class="fchip active" onclick="filterType('all',this)">All Projects</button>
    <button class="fchip" onclick="filterType('Office',this)">Office</button>
    <button class="fchip" onclick="filterType('Mixed-Use',this)">Mixed-Use</button>
    <button class="fchip" onclick="filterType('Residential',this)">Residential</button>
    <button class="fchip" onclick="filterType('Development Site',this)">Dev Site</button>
    <span id="header-count"><strong id="hc-num">7</strong> projects</span>
  </div>
</div>

<div id="app">
  <div id="sidebar">

      <p>Current &amp; upcoming developments — Philadelphia region</p>
    </div>
    <div id="card-list"></div>
  </div>
  <div id="map"></div>
</div>

  },
  {
    id: 7,
    name: "100 Ross Road — PSDC Headquarters",

    status: "hq",

    lot: "6–9 acres",

];

// ── Pin colors by type/status ──
const PIN_COLORS = {
  'Office': '#0d1f3c',
  'Mixed-Use': '#c9a84c',
  'Residential': '#1a7a4a',
  'Development Site': '#e05c2a',
  'hq': '#6b3fa0',
  'dead': '#94a3b8',
};

function pinColor(p) {
  if(p.status === 'dead') return PIN_COLORS['dead'];
  if(p.status === 'hq') return PIN_COLORS['hq'];
  return PIN_COLORS[p.type] || '#0d1f3c';
}

function makeIcon(p, size=32) {
  const c = pinColor(p);
  const s = size;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${Math.round(s*1.31)}" viewBox="0 0 32 42">
    <path d="M16 0C7.16 0 0 7.16 0 16c0 11 16 26 16 26S32 27 32 16C32 7.16 24.84 0 16 0z" fill="${c}" stroke="white" stroke-width="2"/>
    <circle cx="16" cy="16" r="6" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({html:svg, className:'', iconSize:[s, Math.round(s*1.31)], iconAnchor:[s/2, Math.round(s*1.31)], popupAnchor:[0,-Math.round(s*1.31)]});
}

// ── Map init ──
const map = L.map('map', {zoomControl:false}).setView([40.05, -75.28], 10);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom:19
}).addTo(map);

// Legend
const legend = L.control({position:'bottomleft'});
legend.onAdd = () => {
  const d = L.DomUtil.create('div','map-legend');
  const entries = [
    ['Office','#0d1f3c'], ['Mixed-Use','#c9a84c'],
    ['Development Site','#e05c2a'], ['HQ','#6b3fa0'], ['Inactive','#94a3b8']
  ];
  d.innerHTML = '<h4>Property Type</h4>' + entries.map(([l,c])=>
    `<div class="legend-row"><div class="legend-dot" style="background:${c}"></div><span>${l}</span></div>`
  ).join('');
  return d;
};
legend.addTo(map);

// ── Sidebar cards & markers ──
let markers = {};
let activeFilter = 'all';
let activeCard = null;

function statusTagClass(s) {
  if(s==='active') return 'tag-status-active';
  if(s==='proposed') return 'tag-status-proposed';
  if(s==='dead') return 'tag-status-dead';
  if(s==='hq') return 'tag-status-hq';
  return 'tag-type';
}

function buildSidebar(projects) {
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prop-card';
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <div class="prop-card-type">${p.type}</div>
      <div class="prop-card-name">${p.name}</div>
      <div class="prop-card-addr">${p.address}</div>
      <div class="prop-card-tags">
        <span class="tag ${statusTagClass(p.status)}">${p.statusLabel}</span>
        <span class="tag tag-type">${p.size.split(' ')[0]+' '+p.size.split(' ')[1]}</span>
      </div>`;
    card.onclick = () => selectProject(p.id);
    list.appendChild(card);
  });
}

function buildPopup(p) {
  const rows = p.highlights.map(([l,v]) =>
    `<div class="popup-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`
  ).join('');
  const badgeCls = p.status==='active'?'badge-active':p.status==='dead'?'badge-dead':p.status==='hq'?'badge-hq':'badge-proposed';
  return `
    <div class="popup-hero">
      <div class="popup-type">${p.type}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-addr">${p.address}</div>
    </div>
    <div class="popup-body">
      ${rows}
      <div class="popup-desc">${p.description}</div>
      <span class="popup-badge ${badgeCls}">${p.statusLabel}</span>
    </div>`;
}

function buildMarkers(projects) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  projects.forEach(p => {
    const m = L.marker([p.lat, p.lng], {icon: makeIcon(p)});
    m.bindPopup(buildPopup(p), {maxWidth:340, className:''});
    m.on('click', () => selectProject(p.id, false));
    m.addTo(map);
    markers[p.id] = m;
  });
}

function selectProject(id, panMap=true) {
  // Highlight card
  document.querySelectorAll('.prop-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-'+id);
  if(card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  activeCard = id;
  // Open popup & pan
  const m = markers[id];
  const p = PROJECTS.find(x=>x.id===id);
  if(m && p && panMap) {
    map.setView([p.lat, p.lng], Math.max(map.getZoom(), 13), {animate:true});
    m.openPopup();
  } else if(m) {
    m.openPopup();
  }
}

function filterType(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.fchip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type==='all' ? PROJECTS : PROJECTS.filter(p=>p.type===type);
  document.getElementById('hc-num').textContent = filtered.length;
  buildSidebar(filtered);
  buildMarkers(filtered);
  if(filtered.length > 0) {
    const group = L.featureGroup(filtered.map(p=>markers[p.id]));
    map.fitBounds(group.getBounds().pad(0.2), {animate:true});
  }
}

// ── Init ──
buildSidebar(PROJECTS);
buildMarkers(PROJECTS);
</script>
</body>
</html>
